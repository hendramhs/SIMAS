name: CI/CD Frontend SIMAS

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CLONE REPO
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. SETUP NODE
      # =========================
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # 3. BUILD FRONTEND
      # =========================
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build

      # =========================
      # 4. FIX PERMISSION (IMPORTANT)
      # =========================
      - name: Fix permission di EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== FIX PERMISSION ==="
            sudo chown -R ubuntu:ubuntu /var/www/html
            sudo chmod -R 755 /var/www/html

      # =========================
      # 5. CLEAR FILE LAMA
      # =========================
      - name: Clear old frontend
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== DELETE OLD FILE ==="
            rm -rf /var/www/html/*

      # =========================
      # 6. UPLOAD HASIL BUILD
      # =========================
      - name: Upload frontend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/html/"

      # =========================
      # 7. RESTART NGINX
      # =========================
      - name: Restart nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== RESTART NGINX ==="
            sudo systemctl restart nginx