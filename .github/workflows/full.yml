name: CI/CD Frontend SIMAS (Stable)

on:
  push:
    branches:
      - main

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # 1. CLONE REPO
      # =========================
      - name: Checkout Code
        uses: actions/checkout@v4

      # =========================
      # 2. SETUP NODE
      # =========================
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # =========================
      # 3. BUILD FRONTEND
      # =========================
      - name: Install & Build
        run: |
          cd frontend
          npm install
          npm run build

      # =========================
      # 4. FIX PERMISSION DI EC2
      # (WAJIB biar scp gak error)
      # =========================
      - name: Fix permission EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== FIX PERMISSION ==="
            sudo mkdir -p /var/www/html
            sudo chown -R ubuntu:ubuntu /var/www/html
            sudo chmod -R 755 /var/www/html

      # =========================
      # 5. HAPUS FILE LAMA
      # =========================
      - name: Clean old files
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== CLEAN OLD FILE ==="
            rm -rf /var/www/html/*

      # =========================
      # 6. UPLOAD FILE (FIX STRUCTURE)
      # =========================
      - name: Upload frontend
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          source: "frontend/dist/*"
          target: "/var/www/html/"
          strip_components: 2   # 🔥 PENTING: buang folder frontend/dist

      # =========================
      # 7. RESTART NGINX
      # =========================
      - name: Restart nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.GIT_PRIVATE_KEY }}
          script: |
            echo "=== RESTART NGINX ==="
            sudo systemctl restart nginx